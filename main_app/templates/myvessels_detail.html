{% extends 'base.html' %} 
{% load static %}

{% block head %}
<link rel="stylesheet" href="{% static 'css/vessels/vessel-detail.css' %}" />
{% endblock %}

{% block content %}
<section class="vessel-container">
  <div class="vessel-img">
    {% comment %} <img src="{% static 'images/sk8r-boi-cat.svg' %}" alt="A skater boy cat" /> {% endcomment %}
  </div>
  <div class="vessel-details">
    <h1>{{ vessel.name }}</h1>
      <h2> {{ vessel.mmsi }}</h2>
    <p>{{ vessel.imo}}</p>
  </div>
</section>
{% endblock %}
